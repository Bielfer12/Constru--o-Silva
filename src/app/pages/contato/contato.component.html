<section class="cta-section" style="min-height: calc(100vh - 80px); display: flex; align-items: center;">
  <div class="container text-center cta-container">
    <h2 class="section-title">Pronto para iniciar seu projeto?</h2>
    <p class="section-desc mb-4" style="margin-bottom: 3rem;">Preencha o formulário abaixo e um de nossos especialistas entrará em contato.</p>
    
    <form class="contact-form" style="max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px;">
      <input type="text" placeholder="Seu Nome completo" style="padding: 16px; border: 1px solid #E5E7EB; border-radius: 8px; font-family: inherit; font-size: 1rem;">
      <input type="email" placeholder="E-mail" style="padding: 16px; border: 1px solid #E5E7EB; border-radius: 8px; font-family: inherit; font-size: 1rem;">
      <textarea placeholder="Gostaria de falar sobre..." rows="4" style="padding: 16px; border: 1px solid #E5E7EB; border-radius: 8px; resize: none; font-family: inherit; font-size: 1rem;"></textarea>
      <button class="btn-primary btn-lg" style="margin-top: 16px;">Enviar Mensagem</button>
    </form>
  </div>
</section>
