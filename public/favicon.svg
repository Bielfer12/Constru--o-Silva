<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Minimalist Architectural Geometric "S" / Building Icon -->
  <g transform="translate(5, 5) scale(0.9)">
    <!-- Base Structure (Dark Gray) -->
    <path d="M 10 90 L 10 30 L 50 5 L 90 30 L 90 90 Z" fill="#141414" />
    <!-- Dynamic Slice (Gold) -->
    <path d="M 50 5 L 90 30 L 90 90 L 50 70 Z" fill="#d4af37" />
    <!-- Modern Pillar Overlay (White) -->
    <rect x="35" y="40" width="10" height="50" fill="#ffffff" />
    <rect x="55" y="30" width="10" height="45" fill="#ffffff" />
  </g>
</svg>
